name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Lint
        run: go vet ./...

      - name: Build API
        run: docker build -f deployments/docker/Dockerfile.api -t mini-databricks-api:latest .

      - name: Build Scheduler
        run: docker build -f deployments/docker/Dockerfile.scheduler -t mini-databricks-scheduler:latest .

      - name: Build Worker
        run: docker build -f deployments/docker/Dockerfile.worker -t mini-databricks-worker:latest .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
