apiVersion: v1
kind: Secret
metadata:
  name: mini-databricks-secrets
  namespace: default
type: Opaque
stringData:
  db-url: "postgresql://admin:password@postgres-service:5432/minidatabricks?sslmode=disable"
  redis-url: "redis://redis-service:6379"
  kafka-brokers: "kafka-service:9092"
  jwt-secret: "your-super-secret-key-change-in-production"
  minio-endpoint: "192.168.1.2:9000"
  minio-access-key: "minioadmin"
  minio-secret-key: "minioadmin"
