global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: "/metrics"

  - job_name: "scheduler"
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: "/metrics"

  - job_name: "worker"
    static_configs:
      - targets: ["host.docker.internal:9095"]
    metrics_path: "/metrics"
